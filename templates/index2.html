<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Flask</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .contenedor{
            background:white;
            width:420px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        h1{
            margin:0;
            color:#1e3a8a;
            text-align:center;
        }

        h2{
            color:#555;
            text-align:center;
            font-size:18px;
            margin-bottom:30px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{

            width:100%;
            margin-top:25px;
            padding:14px;
            border:none;
            border-radius:8px;

            background:#2563eb;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div class="contenedor">

<form method="post" action="/">

<h1>Calculadora Flask</h1>

<h2>Primer proyecto web desarrollado con Flask</h2>

<label>Valor 1</label>

<input
    type="number"
    id="valor1"
    name="valor1">

<label>Valor 2</label>

<input
    type="number"
    id="valor2"
    name="valor2">

<button
    type="submit"
    id="calcula"
    name="calcula">

    Calcular

</button>

</form>

</div>

</body>

</html>
